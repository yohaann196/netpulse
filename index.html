<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Netpulse — is it down?</title>
  <meta name="description" content="Crowdsourced status for 100+ popular services. No scraping, no API keys — just people reporting what's broken." />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">

    <header class="header">
      <div class="logo">
        <div class="logo-mark"><div class="logo-pulse"></div></div>
        <span class="logo-text">netpulse</span>
      </div>
      <div class="header-meta">
        <span class="live-pip"></span>
        <span class="last-updated" id="last-updated">just now</span>
      </div>
    </header>

    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search 100+ services…" autocomplete="off" spellcheck="false" oninput="onSearch()" />
    </div>

    <div class="filters" id="filters">
      <button class="pill active" onclick="setFilter('all',this)">All</button>
      <button class="pill" onclick="setFilter('down',this)">Down</button>
      <button class="pill" onclick="setFilter('issues',this)">Degraded</button>
      <button class="pill" onclick="setFilter('social',this)">Social</button>
      <button class="pill" onclick="setFilter('streaming',this)">Streaming</button>
      <button class="pill" onclick="setFilter('gaming',this)">Gaming</button>
      <button class="pill" onclick="setFilter('cloud',this)">Cloud</button>
      <button class="pill" onclick="setFilter('developer',this)">Dev tools</button>
      <button class="pill" onclick="setFilter('finance',this)">Finance</button>
      <button class="pill" onclick="setFilter('ai',this)">AI</button>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val" id="s-ok">—</div>
        <div class="stat-label">operational</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="s-issues">—</div>
        <div class="stat-label">with issues</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="s-reports">—</div>
        <div class="stat-label">open reports</div>
      </div>
    </div>

    <div id="service-list"></div>

    <footer class="footer">
      <span>reports via github issues · no scraping · no backend</span>
      <a id="suggest-link" href="#" target="_blank" rel="noopener">suggest a service ↗</a>
    </footer>

  </div>

  <script src="services.js"></script>
  <script src="app.js"></script>
  <script>boot();</script>
</body>
</html>
