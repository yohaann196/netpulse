<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>add service — netpulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f3f0; --surface: #fff; --surface2: #f0efec;
      --text: #181816; --muted: #6b6b67; --hint: #a0a09b;
      --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.16);
      --r: 8px; --rl: 12px;
      --mono: 'IBM Plex Mono', monospace; --sans: 'Inter', system-ui, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141412; --surface: #1e1e1c; --surface2: #252523;
        --text: #eeede8; --muted: #8a8a85; --hint: #5a5a56;
        --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
      }
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); padding: 2rem 1rem 4rem; }
    .wrap { max-width: 560px; margin: 0 auto; }
    h1 { font-size: 17px; font-weight: 600; margin-bottom: 2px; }
    .sub { font-size: 12px; color: var(--hint); font-family: var(--mono); margin-bottom: 2rem; }

    .preview {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; background: var(--surface);
      border: 0.5px solid var(--border); border-radius: var(--rl); margin-bottom: 1.5rem;
    }
    .prev-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .prev-name { font-size: 14px; font-weight: 500; }
    .prev-meta { font-size: 12px; color: var(--muted); font-family: var(--mono); margin-top: 1px; }
    .badge-ok { margin-left: auto; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 500; background: #EAF3DE; color: #3B6D11; }
    @media (prefers-color-scheme: dark) { .badge-ok { background: #173404; color: #C0DD97; } }

    .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--rl); padding: 1.25rem; margin-bottom: 1rem; }
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    label { display: block; font-size: 11px; color: var(--hint); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
    input[type=text], input[type=number], select {
      width: 100%; padding: 8px 11px; border: 0.5px solid var(--border2);
      border-radius: var(--r); font-size: 13px; font-family: var(--sans);
      background: var(--bg); color: var(--text); outline: none; transition: border-color 0.13s;
    }
    input:focus, select:focus { border-color: var(--muted); }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .color-row { display: flex; gap: 8px; align-items: center; }
    .color-row input[type=color] { width: 36px; height: 36px; padding: 2px; border-radius: 6px; border: 0.5px solid var(--border2); cursor: pointer; flex-shrink: 0; }
    .color-row input[type=text] { flex: 1; font-family: var(--mono); }
    .color-swatch { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }

    hr { border: none; border-top: 0.5px solid var(--border); margin: 1.5rem 0; }

    .out-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--hint); margin-bottom: 6px; }
    .code-wrap { position: relative; margin-bottom: 1.25rem; }
    .code {
      background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--r);
      padding: 11px 13px; font-family: var(--mono); font-size: 12px; color: var(--text);
      white-space: pre; overflow-x: auto; line-height: 1.6;
    }
    .copy {
      position: absolute; top: 7px; right: 7px; padding: 3px 9px; font-size: 11px;
      font-family: var(--sans); border-radius: 5px; border: 0.5px solid var(--border2);
      background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.13s;
    }
    .copy:hover { color: var(--text); }
    .copy.ok { color: #3B6D11; border-color: #639922; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>add service</h1>
  <div class="sub">netpulse · internal tool · open locally, don't deploy</div>

  <div class="preview">
    <div class="prev-icon" id="pi"></div>
    <div><div class="prev-name" id="pn"></div><div class="prev-meta" id="pm"></div></div>
    <span class="badge-ok">Operational</span>
  </div>

  <div class="card">
    <div class="row2">
      <div class="field"><label>Name</label><input type="text" id="f-name" value="Cloudinary" oninput="go()" /></div>
      <div class="field">
        <label>Category</label>
        <select id="f-cat" onchange="go()">
          <option value="developer" selected>developer</option>
          <option value="cloud">cloud</option>
          <option value="social">social</option>
          <option value="streaming">streaming</option>
          <option value="gaming">gaming</option>
          <option value="finance">finance</option>
          <option value="ai">ai</option>
        </select>
      </div>
    </div>
    <div class="row2">
      <div class="field"><label>Icon (1 char)</label><input type="text" id="f-icon" value="◈" maxlength="2" oninput="go()" /></div>
      <div class="field"><label>GitHub label</label><input type="text" id="f-label" value="cloudinary" oninput="go()" /></div>
    </div>
    <div class="field">
      <label>Brand color</label>
      <div class="color-row">
        <input type="color" id="f-cp" value="#3448C5" oninput="syncColor('p')" />
        <input type="text" id="f-ct" value="#3448C5" maxlength="7" oninput="syncColor('t')" />
        <div class="color-swatch" id="f-cs"></div>
      </div>
    </div>
    <div class="field">
      <label>ID (next in SERVICES)</label>
      <input type="number" id="f-id" value="101" min="1" oninput="go()" style="width:90px;" />
    </div>
  </div>

  <hr />

  <div class="out-label">paste into SERVICES in services.js</div>
  <div class="code-wrap">
    <div class="code" id="o-js"></div>
    <button class="copy" onclick="cp('o-js',this)">copy</button>
  </div>

  <div class="out-label">create the github label (run once)</div>
  <div class="code-wrap">
    <div class="code" id="o-curl"></div>
    <button class="copy" onclick="cp('o-curl',this)">copy</button>
  </div>
</div>

<script>
  function slug(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }

  function syncColor(src) {
    const p = document.getElementById('f-cp'), t = document.getElementById('f-ct');
    if (src === 'p') t.value = p.value;
    else if (/^#[0-9a-fA-F]{6}$/.test(t.value)) p.value = t.value;
    go();
  }

  function go() {
    const name  = document.getElementById('f-name').value.trim() || 'Service';
    const cat   = document.getElementById('f-cat').value;
    const icon  = document.getElementById('f-icon').value.trim() || '◈';
    const color = document.getElementById('f-ct').value.trim();
    const id    = parseInt(document.getElementById('f-id').value) || 101;
    let label   = document.getElementById('f-label').value.trim();
    if (!label) { label = slug(name); document.getElementById('f-label').value = label; }
    const c = /^#[0-9a-fA-F]{6}$/.test(color) ? color : '#888888';

    document.getElementById('pi').style.cssText = `background:${c}1a;color:${c};width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;`;
    document.getElementById('pi').textContent = icon;
    document.getElementById('pn').textContent = name;
    document.getElementById('pm').textContent = `${cat} · ${label}`;
    document.getElementById('f-cs').style.background = c + '1a';
    document.getElementById('f-cs').style.color = c;
    document.getElementById('f-cs').textContent = icon;

    document.getElementById('o-js').textContent =
      `{ id: ${id}, name: '${name}', icon: '${icon}', color: '${c}', category: '${cat}', label: '${label}' },`;

    document.getElementById('o-curl').textContent =
`REPO="you/netpulse"
TOKEN="ghp_yourtoken"

curl -s -X POST "https://api.github.com/repos/$REPO/labels" \\
  -H "Authorization: token $TOKEN" \\
  -H "Content-Type: application/json" \\
  -d '{"name":"${label}","color":"${c.slice(1)}"}'`;
  }

  function cp(id, btn) {
    navigator.clipboard.writeText(document.getElementById(id).textContent.trim()).then(() => {
      btn.textContent = 'copied!'; btn.classList.add('ok');
      setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('ok'); }, 1800);
    });
  }

  go();
</script>
</body>
</html>
