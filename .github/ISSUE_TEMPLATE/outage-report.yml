name: Outage Report
description: Report an outage or degradation for a tracked service.
body:
  - type: markdown
    attributes:
      value: |
        ⚠️ If you got here from the main "↑ report outage" button, you must manually select the matching service label on the right side of this page before submitting. If you got here by clicking "↑ report outage" inside a specific service card, the label has already been applied automatically — just submit.
  - type: dropdown
    id: service
    attributes:
      label: Affected Service
      description: Select the service that is experiencing issues.
      options:
        - Discord
        - Slack
        - Twitter / X
        - Instagram
        - Facebook
        - WhatsApp
        - Telegram
        - Reddit
        - LinkedIn
        - Snapchat
        - TikTok
        - Pinterest
        - Mastodon
        - Zoom
        - Teams
        - Twitch
        - YouTube
        - Netflix
        - Spotify
        - Disney+
        - Apple Music
        - SoundCloud
        - Hulu
        - HBO Max
        - Amazon Prime
        - Apple TV+
        - Peacock
        - Deezer
        - Plex
        - Steam
        - PlayStation
        - Xbox
        - Roblox
        - Epic Games
        - Riot Games
        - Battle.net
        - EA / Origin
        - Nintendo
        - Minecraft
        - Ubisoft
        - GOG
        - AWS
        - Google Cloud
        - Azure
        - Cloudflare
        - Vercel
        - Netlify
        - Heroku
        - DigitalOcean
        - Fastly
        - Akamai
        - Render
        - Fly.io
        - Railway
        - Google Workspace
        - Dropbox
        - OneDrive
        - Salesforce
        - GitHub
        - GitLab
        - Bitbucket
        - npm
        - PyPI
        - Docker Hub
        - Sentry
        - Datadog
        - PagerDuty
        - Jira
        - Confluence
        - Linear
        - Notion
        - Figma
        - Supabase
        - Firebase
        - MongoDB Atlas
        - PlanetScale
        - Neon
        - Postman
        - Twilio
        - SendGrid
        - Mailchimp
        - Intercom
        - Zendesk
        - HubSpot
        - OpenAI
        - Anthropic
        - Google Gemini
        - Midjourney
        - Hugging Face
        - Replicate
        - Perplexity
        - Cursor
        - Stripe
        - PayPal
        - Shopify
        - Square
        - Coinbase
        - Plaid
        - Braintree
        - Adyen
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "Minor — slow or partially broken"
        - "Major — significantly degraded"
        - "Total outage — completely unreachable"
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Additional Details
      description: Optional — describe what you are experiencing in more detail.
    validations:
      required: false
